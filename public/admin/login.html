<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Basaveshwar Hotel Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body class="login-page">
    <!-- Animated Background -->
    <div class="bg-gradient"></div>
    <div class="floating-shape" style="width: 300px; height: 300px; top: -10%; right: -10%;"></div>
    <div class="floating-shape"
        style="width: 400px; height: 400px; bottom: -15%; left: -10%; background: #FF8A65; opacity: 0.3;"></div>

    <div class="login-wrapper">
        <div class="login-box reveal active">
            <div class="login-header">
                <i class="fa-solid fa-utensils login-logo"></i>
                <h2>Staff Portal</h2>
                <p>Welcome back! Please login to continue.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-container">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Username" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                    </div>
                </div>

                <div id="error-msg" class="error-text"></div>

                <button type="submit" class="btn-login btn-premium"
                    style="width: 100%; border-radius: 12px; margin-top: 1rem;">
                    <span>Secure Login</span>
                    <i class="fa-solid fa-shield-halved"></i>
                </button>
            </form>

            <div id="success-feedback" style="display: none; padding: 2rem 0;">
                <div
                    style="width: 80px; height: 80px; background: rgba(76, 175, 80, 0.1); color: #2E7D32; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem; animation: successBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h3 style="color: #2E7D32; margin-bottom: 0.5rem;">Access Granted</h3>
                <p style="color: #666;">Redirecting to your dashboard...</p>
            </div>

            <div class="login-footer">
                <a href="/"><i class="fa-solid fa-arrow-left"></i> Back to Brand Website</a>
            </div>
        </div>
    </div>

    <style>
        :root {
            --primary: #E65100;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-blur: blur(20px);
        }

        body.login-page {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            background: #FFF8E1;
            position: relative;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, #FFF8E1, #FFECB3, #FFE082);
            background-size: 400% 400%;
            animation: gradientMove 15s infinite alternate ease-in-out;
            z-index: -2;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%
            }

            100% {
                background-position: 100% 50%
            }
        }

        .floating-shape {
            position: absolute;
            background: rgba(230, 81, 0, 0.2);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1) rotate(0);
            }

            100% {
                transform: translate(100px, 50px) scale(1.2) rotate(45deg);
            }
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }

        .login-box {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 2px solid var(--glass-border);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.5s ease;
        }

        .login-header h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #3E2723;
            margin: 1rem 0 0.5rem;
        }

        .login-header p {
            color: #5D4037;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            font-size: 3.5rem;
            color: var(--primary);
            background: white;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(230, 81, 0, 0.1);
            margin-inline: auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-container i {
            position: absolute;
            left: 1.2rem;
            color: #8D6E63;
        }

        .input-container input {
            width: 100%;
            padding: 1.2rem 1.2rem 1.2rem 3.5rem;
            border-radius: 12px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            color: #3E2723;
            transition: all 0.3s ease;
        }

        .input-container input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(230, 81, 0, 0.1);
        }

        .btn-premium {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 1.1rem 2rem;
            background: linear-gradient(135deg, #E65100, #F4511E);
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(230, 81, 0, 0.2);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .btn-premium:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(230, 81, 0, 0.3);
        }

        .error-text {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
            background: rgba(211, 47, 47, 0.1);
            padding: 0.8rem;
            border-radius: 8px;
            text-align: left;
        }

        .login-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .login-footer a {
            color: #8D6E63;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: var(--primary);
        }

        @keyframes successBounce {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
            transform: translate3d(0, 0, 0);
        }
    </style>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.querySelector('.btn-login');
            const loginForm = document.getElementById('loginForm');
            const successFeedback = document.getElementById('success-feedback');
            const loginBox = document.querySelector('.login-box');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Verifying...</span> <i class="fa-solid fa-spinner fa-spin"></i>';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('basaveshwar_admin_token', data.token);
                    localStorage.setItem('basaveshwar_admin_role', data.role);
                    localStorage.setItem('basaveshwar_admin_id', data.id);

                    // Show success animation
                    loginForm.style.display = 'none';
                    successFeedback.style.display = 'block';
                    loginBox.style.borderColor = '#4CAF50';

                    setTimeout(() => {
                        if (data.role === 'manager') window.location.href = 'manager.html';
                        else if (data.role === 'cashier') window.location.href = 'cashier.html';
                        else if (data.role === 'waiter') window.location.href = 'waiter.html';
                        else window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    errorMsg.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${data.message || 'Login failed. Please check credentials.'}`;
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Secure Login</span> <i class="fa-solid fa-shield-halved"></i>';

                    // Shake animation on error
                    loginBox.classList.add('shake');
                    setTimeout(() => loginBox.classList.remove('shake'), 500);
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerHTML = '<i class="fa-solid fa-server"></i> System error. Please verify the server and database are active.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Secure Login</span> <i class="fa-solid fa-shield-halved"></i>';
            }
        });
    </script>
</body>

</html>
